name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
            '.version = $v' \
            custom_components/radio_orlicko/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/radio_orlicko/manifest.json

      - name: Build release zip
        run: |
          cd custom_components
          zip -r ../radio_orlicko.zip radio_orlicko/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: radio_orlicko.zip
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
